runName: "superMarioWorldNEAT-8x8-SUPERFIXED3"
seed: 123

# Main
targetFitness:                      10000.0
populationSize:                     150
targetSpeciesSize:                  10 # This will be not needed when we delete dynamic threshold
survivalThreshold:                  0.2
elitism:                            2
stagnationThreshold:                50
evaluationEpisodes:                 1
initializeSynapses:                 False
saveCheckpoints:                    True

# Showcase Options
showcaseOptions:
  episodes:                         1
  fps:                              60
  upscalingFactor:                  8
  filename:                         "superMarioWorld"
  folder:                           "videos"
  vizCornerTopLeftInPercent:        [0.05, 0.2]
  vizCornerBottomRightInPercent:    [0.95, 0.5]
  globalAlpha:                      0.8

  visualization:
    coloredObservation:             True
    positiveColor:                  [0.439, 0.788, 0.439, 1.0]
    neutralNeuronColor:             [1.0, 1.0, 1.0, 1.0]
    neutralSynapseColor:            [0.9, 0.9, 0.9, 0.05]
    negativeColor:                  [0.788, 0.275, 0.275, 1.0]
    gridColor:                      [0.0, 0.0, 0.0, 1.0]
    gridThickness:                  5
    synapseWidthMultiplier:         3

# Mutations
mutationChanceModifyWeight:         0.8
mutationChanceSynapse:              0.4
mutationChanceNeuron:               0.1
resetWeightChance:                  0.1
weightMutationScale:                0.2

# Rarely Modified
defaultCompatibilityThreshold:      3.0
compatibilityAdjustmentSpeed:       0.0 # I dislike this in general, might delete dynamic adjustment
lossWeight_E:                       1.0
lossWeight_D:                       1.0
lossWeight_W:                       0.0 # I dislike this, I'd rather calculate compatibility based on architecture not weights
